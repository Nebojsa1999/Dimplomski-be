spring.jpa.hibernate.ddl-auto=none

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db.changelog-master.xml
spring.liquibase.contexts=development,production

server.port=${PORT:8081}

# Base URL used in verification email links
app.base-url=${APP_BASE_URL:http://localhost:8081}

brevo.api-key=${BREVO_API_KEY:dummy}
brevo.from=${BREVO_FROM:noreply@example.com}

# Lab document upload directory
app.upload.dir=uploads/lab-documents