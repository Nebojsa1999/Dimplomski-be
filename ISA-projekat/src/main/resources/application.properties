spring.jpa.hibernate.ddl-auto=none

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db.changelog-master.xml
spring.liquibase.contexts=development,production

server.port=${PORT:8081}

# Base URL used in verification email links
app.base-url=${APP_BASE_URL:http://localhost:8081}

# Mail configuration (replace with your SMTP provider credentials)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Lab document upload directory
app.upload.dir=uploads/lab-documents